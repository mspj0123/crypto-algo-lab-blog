title: "Crypto Algo Lab"
description: "暗号資産アルゴリズム取引の開発記録 — LightGBM × テクニカル分析 × Coincheck"
baseurl: "/crypto-algo-lab-blog"
url: "https://mspj0123.github.io"
lang: ja

remote_theme: "mmistakes/minimal-mistakes@4.26.2"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# 著者情報
author:
  name: "mspj0123"
  bio: "暗号資産アルゴリズム取引Botを開発・運用中。LightGBM × テクニカル分析 × Coincheck API。実運用の記録を発信しています。"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mspj0123"

# サイト全体のデフォルト設定
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
      related: true
      toc: true
      toc_label: "目次"

# ナビゲーション（_data/navigation.yml で管理）

# スキン（カラーテーマ）: "default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
minimal_mistakes_skin: "air"

# ページネーション
paginate: 10
paginate_path: "/page:num/"

# カテゴリ・タグページ
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - "*.py"
