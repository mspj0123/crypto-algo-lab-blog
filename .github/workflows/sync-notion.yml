name: Sync Notion to Blog

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync Notion posts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: "3548f0b7-804f-818e-9ecb-e90a8741cb50"
        run: python scripts/sync_notion.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: Notion から記事を自動同期 $(date +'%Y-%m-%d')"
            git push
          fi
